<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Claude Session Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      color: #ccc;
      background: #0f0f0f;
      padding: 14px;
    }
    .title { font-size: 13px; font-weight: 700; color: #cc785c; margin-bottom: 14px; letter-spacing: 1px; }
    label { display: block; color: #666; font-size: 11px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
    .btn-group button {
      flex: 1; min-width: 44px;
      padding: 8px 4px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 5px;
      color: #888;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-group button:hover { border-color: #555; color: #ccc; }
    .btn-group button.active {
      background: #1e1209;
      border-color: #cc785c;
      color: #cc785c;
      font-weight: 700;
    }
    .section { margin-top: 14px; }
    .install {
      width: 100%;
      padding: 9px 10px;
      background: #1a1a1a;
      border: 1px solid #cc785c;
      border-radius: 5px;
      color: #cc785c;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .install:hover { background: #2a1510; }
    .install:disabled { opacity: 0.5; cursor: default; }
    .hint { margin-top: 10px; color: #444; font-size: 10px; line-height: 1.6; }
    .hint span { color: #666; }
    .result {
      margin-top: 8px;
      padding: 7px 9px;
      background: #111;
      border-left: 2px solid #cc785c;
      font-size: 10px;
      line-height: 1.5;
      color: #999;
      word-break: break-all;
      display: none;
    }
    .result.err { border-left-color: #ff3b30; color: #ff8b85; }
  </style>
</head>
<body>
  <div class="title">CLAUDE SESSION</div>

  <label>Slot (sorted by recency)</label>
  <div class="btn-group" id="slotGroup">
    <button data-slot="0">1</button>
    <button data-slot="1">2</button>
    <button data-slot="2">3</button>
    <button data-slot="3">4</button>
    <button data-slot="4">5</button>
  </div>
  <div class="hint">
    <span>1</span> = most recent active session, <span>2</span> = next, …
  </div>

  <div class="section">
    <label>Setup</label>
    <button class="install" id="installBtn">INSTALL CLAUDE HOOKS</button>
    <div class="hint">
      Adds entries to <span>~/.claude/settings.json</span> so the button can detect session state. Idempotent — safe to re-run.
    </div>
    <div id="result" class="result"></div>
  </div>

  <script>
    let ws, uuid;
    let settings = { slot: 0 };

    const connectElgatoStreamDeckSocket = (inPort, inPropertyInspectorUUID, inRegisterEvent) => {
      uuid = inPropertyInspectorUUID;
      ws = new WebSocket(`ws://127.0.0.1:${inPort}`);
      ws.onopen = () => {
        ws.send(JSON.stringify({ event: inRegisterEvent, uuid }));
        ws.send(JSON.stringify({ event: 'getSettings', context: uuid }));
      };
      ws.onmessage = (evt) => {
        const data = JSON.parse(evt.data);
        if (data.event === 'didReceiveSettings') {
          settings = { slot: 0, ...(data.payload.settings || {}) };
          updateUI();
        } else if (data.event === 'sendToPropertyInspector') {
          handlePluginMessage(data.payload);
        }
      };
    };

    function updateUI() {
      document.querySelectorAll('#slotGroup button').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.slot, 10) === settings.slot);
      });
    }

    function save() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ event: 'setSettings', context: uuid, payload: settings }));
    }

    document.querySelectorAll('#slotGroup button').forEach(btn => {
      btn.addEventListener('click', () => {
        settings.slot = parseInt(btn.dataset.slot, 10);
        updateUI();
        save();
      });
    });

    document.getElementById('installBtn').addEventListener('click', () => {
      const btn = document.getElementById('installBtn');
      btn.disabled = true;
      btn.textContent = 'INSTALLING…';
      ws.send(JSON.stringify({
        event: 'sendToPlugin',
        context: uuid,
        payload: { action: 'installHooks' },
      }));
    });

    function handlePluginMessage(payload) {
      if (payload?.event !== 'installHooksResult') return;
      const btn = document.getElementById('installBtn');
      btn.disabled = false;
      btn.textContent = 'INSTALL CLAUDE HOOKS';
      const box = document.getElementById('result');
      box.style.display = 'block';
      if (payload.error) {
        box.classList.add('err');
        box.textContent = 'Error: ' + payload.error;
      } else {
        box.classList.remove('err');
        const added = (payload.installed || []).length;
        const skipped = (payload.skipped || []).length;
        box.textContent = `Added ${added} hooks, ${skipped} already present.`;
      }
    }
  </script>
</body>
</html>
