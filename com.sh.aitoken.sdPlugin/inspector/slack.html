<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Slack Notifications Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      color: #ccc;
      background: #0f0f0f;
      padding: 14px;
    }
    .title {
      font-size: 13px;
      font-weight: 700;
      color: #e01e5a;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    label {
      display: block;
      color: #666;
      font-size: 11px;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 5px;
      color: #eee;
      padding: 7px 9px;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 11px;
      outline: none;
    }
    input:focus { border-color: #e01e5a; }
    .hint {
      margin-top: 7px;
      color: #444;
      font-size: 10px;
      line-height: 1.6;
    }
    a { color: #e01e5a; text-decoration: none; }
    .status {
      margin-top: 12px;
      padding: 7px 9px;
      border-radius: 5px;
      font-size: 11px;
      background: #1a1a1a;
      color: #666;
      border: 1px solid #222;
    }
    .status.ok { color: #30d158; border-color: #1a3a20; }
    .status.err { color: #ff3b30; border-color: #3a1a1a; }
  </style>
</head>
<body>
  <div class="title"># SLACK ALERTS</div>

  <label>User OAuth Token</label>
  <input type="password" id="tokenInput" placeholder="xoxp-..."/>
  <div class="hint">
    1. <a href="https://api.slack.com/apps" target="_blank">api.slack.com/apps</a> 에서 앱 생성<br>
    2. OAuth Scopes: <code>channels:read, groups:read, im:read, mpim:read</code><br>
    3. Install to Workspace → User OAuth Token 복사
  </div>
  <div class="status" id="statusEl">Token을 입력하면 알림 수가 표시됩니다.</div>

  <script>
    let ws, uuid;
    let settings = {};

    const connectElgatoStreamDeckSocket = (inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) => {
      uuid = inPropertyInspectorUUID;
      ws = new WebSocket(`ws://127.0.0.1:${inPort}`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ event: inRegisterEvent, uuid }));
        ws.send(JSON.stringify({ event: "getSettings", context: uuid }));
      };

      ws.onmessage = (evt) => {
        const data = JSON.parse(evt.data);
        if (data.event === "didReceiveSettings") {
          settings = { ...settings, ...data.payload.settings };
          if (settings.token) {
            document.getElementById("tokenInput").value = settings.token;
            setStatus("ok", "Token saved. Polling every 10s.");
          }
        }
      };
    };

    function setStatus(type, msg) {
      const el = document.getElementById("statusEl");
      el.className = "status " + type;
      el.textContent = msg;
    }

    function saveSettings() {
      const token = document.getElementById("tokenInput").value.trim();
      if (!token) return;
      if (!token.startsWith("xoxp-") && !token.startsWith("xoxe-")) {
        setStatus("err", "Token should start with xoxp- or xoxe-");
        return;
      }
      settings.token = token;
      ws.send(JSON.stringify({ event: "setSettings", context: uuid, payload: settings }));
      setStatus("ok", "Token saved. Polling every 10s.");
    }

    document.getElementById("tokenInput").addEventListener("change", saveSettings);
    document.getElementById("tokenInput").addEventListener("blur", saveSettings);
  </script>
</body>
</html>
