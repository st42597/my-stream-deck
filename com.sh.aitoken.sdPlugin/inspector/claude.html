<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Claude Code Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      color: #ccc;
      background: #0f0f0f;
      padding: 14px;
    }
    .title { font-size: 13px; font-weight: 700; color: #cc785c; margin-bottom: 14px; letter-spacing: 1px; }
    label { display: block; color: #666; font-size: 11px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
    .btn-group button {
      flex: 1; min-width: 44px;
      padding: 8px 4px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 5px;
      color: #888;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-group button:hover { border-color: #555; color: #ccc; }
    .btn-group button.active {
      background: #1e1209;
      border-color: #cc785c;
      color: #cc785c;
      font-weight: 700;
    }
    .hint { margin-top: 10px; color: #444; font-size: 10px; line-height: 1.6; }
    .hint span { color: #666; }
  </style>
</head>
<body>
  <div class="title">CLAUDE CODE</div>

  <label>Refresh Interval</label>
  <div class="btn-group" id="freqGroup">
    <button data-sec="0">Manual</button>
    <button data-sec="60">1 min</button>
    <button data-sec="120">2 min</button>
    <button data-sec="300">5 min</button>
    <button data-sec="900">15 min</button>
    <button data-sec="1800">30 min</button>
  </div>
  <div class="hint">
    Fetched from <span>api.anthropic.com/api/oauth/usage</span><br>
    using your local Keychain credentials.
  </div>

  <script>
    let ws, uuid;
    let settings = { refreshSeconds: 300 };

    const connectElgatoStreamDeckSocket = (inPort, inPropertyInspectorUUID, inRegisterEvent) => {
      uuid = inPropertyInspectorUUID;
      ws = new WebSocket(`ws://127.0.0.1:${inPort}`);
      ws.onopen = () => {
        ws.send(JSON.stringify({ event: inRegisterEvent, uuid }));
        ws.send(JSON.stringify({ event: 'getSettings', context: uuid }));
      };
      ws.onmessage = (evt) => {
        const data = JSON.parse(evt.data);
        if (data.event === 'didReceiveSettings') {
          settings = { refreshSeconds: 300, ...data.payload.settings };
          updateUI();
        }
      };
    };

    function updateUI() {
      document.querySelectorAll('#freqGroup button').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.sec) === settings.refreshSeconds);
      });
    }

    function save() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ event: 'setSettings', context: uuid, payload: settings }));
    }

    document.querySelectorAll('#freqGroup button').forEach(btn => {
      btn.addEventListener('click', () => {
        settings.refreshSeconds = parseInt(btn.dataset.sec);
        updateUI();
        save();
      });
    });
  </script>
</body>
</html>
